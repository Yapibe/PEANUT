# Pipeline configuration file
experiment_name: 'test_experiment'
species: 'H_sapiens'
alpha: 0.2

# Network configuration
network_type: 'custom'  # 'default' or 'custom'
network_name: 'small_graph'  # For default: 'Anat' or 'HumanNet', for custom: filename without extension
network_path: 'pipeline/Data/H_sapiens/network/custom/small_graph'  # Full path for custom networks

pathway_file: 'kegg'
min_genes_per_pathway: 15
max_genes_per_pathway: 500
fdr_threshold: 0.05
run_gsea: false
restrict_to_network: false
create_similarity_matrix: true

# Test input files
condition_data_files:
  - 'pipeline/Inputs/experiments_data/GSE/RNK/GSE5281VCX_KEGG_ALZHEIMERS_DISEASE.rnk'

